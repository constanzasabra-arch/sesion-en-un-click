<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Portal Familias · Fono Aprende</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --sky:#89C4D9;--sky-l:#C8E4F0;--sky-p:#EDF6FA;
  --lilac:#B8A0CC;--lilac-l:#DDD0EE;--lilac-p:#F4F0FA;
  --rose:#D9A0B0;--rose-l:#EDD0D8;--rose-p:#FAF0F3;
  --sage:#9ABBA8;--sage-l:#C8DDD2;--sage-p:#EDF5F1;
  --sand:#C8B890;--ink:#2C3040;--ink-60:#7A7E90;--ink-30:#C0C2CC;
  --grad:linear-gradient(135deg,#C8E4F0,#DDD0EE);
  --bg:linear-gradient(160deg,#EDF6FA 0%,#F4F0FA 50%,#FAF0F3 100%);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;color:var(--ink);}
.screen{display:none;}.screen.active{display:block;}

/* LOGIN - mismo estilo que el diseño original */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-card{background:white;border-radius:28px;padding:36px 28px 32px;width:100%;max-width:360px;box-shadow:0 8px 48px rgba(44,48,64,.10);}
.login-logo{text-align:center;margin-bottom:6px;}
.login-logo img{width:130px;height:auto;display:block;margin:0 auto 10px;}
.login-name{text-align:center;font-size:19px;font-weight:700;color:var(--ink);margin-bottom:2px;}
.login-spec{text-align:center;font-size:13px;color:var(--ink-60);margin-bottom:6px;}
.login-tag{text-align:center;display:block;font-size:11px;font-weight:600;color:var(--sky);text-transform:uppercase;letter-spacing:.7px;margin-bottom:24px;}
.code-label{font-size:12px;font-weight:600;color:var(--ink-60);text-align:center;margin-bottom:12px;letter-spacing:.3px;}
.code-boxes{display:flex;gap:8px;justify-content:center;margin-bottom:20px;}
.code-box{
  width:44px;height:52px;border:1.5px solid rgba(44,48,64,.15);
  border-radius:14px;font-size:20px;font-weight:800;
  text-align:center;color:var(--ink);background:#FAFCFF;
  outline:none;text-transform:uppercase;transition:border-color .2s,box-shadow .2s;
  font-family:'DM Sans',sans-serif;
}
.code-box:focus{border-color:var(--sky);box-shadow:0 0 0 4px rgba(137,196,217,.15);}
.code-box.filled{border-color:var(--sky);background:var(--sky-p);}
.btn-enter{
  width:100%;padding:15px;background:var(--grad);color:white;border:none;
  border-radius:16px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;
  cursor:pointer;box-shadow:0 4px 18px rgba(137,196,217,.4);transition:all .2s;
}
.btn-enter:active{transform:scale(.98);}
.btn-enter:disabled{opacity:.5;cursor:not-allowed;}
.login-err{text-align:center;font-size:13px;color:#dc2626;margin-top:10px;min-height:18px;}
.powered{text-align:center;margin-top:18px;padding-top:14px;border-top:1px solid rgba(44,48,64,.07);font-size:11px;color:var(--ink-30);}
.powered strong{color:var(--sky);}

/* HEADER */
.app-hdr{background:rgba(255,255,255,.95);backdrop-filter:blur(16px);border-bottom:1px solid rgba(44,48,64,.07);padding:0 16px;position:sticky;top:0;z-index:100;}
.prof-bar{display:flex;align-items:center;gap:10px;padding:12px 0 10px;border-bottom:1px solid rgba(44,48,64,.06);}
.prof-av{width:34px;height:34px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:white;flex-shrink:0;overflow:hidden;}
.prof-av img{width:100%;height:100%;object-fit:contain;}
.prof-name{font-size:13px;font-weight:600;color:var(--ink);}
.prof-spec{font-size:11px;color:var(--ink-60);}
.btn-salir{margin-left:auto;background:none;border:1.5px solid var(--ink-30);border-radius:10px;padding:5px 12px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--ink-60);cursor:pointer;}
.child-bar{display:flex;align-items:center;gap:12px;padding:10px 0 12px;}
.child-av{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--sage),var(--sky));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:white;flex-shrink:0;}
.child-name{font-size:15px;font-weight:700;color:var(--ink);}
.child-age{font-size:11px;color:var(--ink-60);margin-top:2px;}
.child-cnt{margin-left:auto;background:var(--sky-p);border:1px solid var(--sky-l);border-radius:10px;padding:6px 12px;text-align:center;}
.child-cnt .n{font-size:18px;font-weight:800;color:var(--sky);line-height:1;}
.child-cnt .l{font-size:9px;font-weight:600;color:var(--ink-60);text-transform:uppercase;}

/* NAV */
.nav{display:flex;background:rgba(255,255,255,.95);border-bottom:1px solid rgba(44,48,64,.07);}
.nb{flex:1;padding:11px 4px;background:none;border:none;border-bottom:2.5px solid transparent;margin-bottom:-1px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;}
.nb .ni{font-size:18px;display:block;margin-bottom:3px;}
.nb .nl{font-size:10px;font-weight:600;color:var(--ink-60);letter-spacing:.3px;}
.nb.active{border-bottom-color:var(--sky);}.nb.active .nl{color:var(--sky);}

/* CONTENT */
.tc{padding:16px;max-width:520px;margin:0 auto;padding-bottom:48px;}
.tp{display:none;}.tp.active{display:block;}
.card{background:white;border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:0 2px 14px rgba(44,48,64,.07);}
.sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ink-60);margin-bottom:10px;}
.ses-tag{display:inline-block;font-size:10px;font-weight:700;color:var(--sky);text-transform:uppercase;letter-spacing:.6px;background:var(--sky-p);border:1px solid var(--sky-l);border-radius:20px;padding:3px 11px;margin-bottom:12px;}
.or{display:flex;align-items:flex-start;gap:9px;padding:8px 11px;border-radius:11px;margin-bottom:5px;}
.or-ok{background:#F0FAF4;}.or-prog{background:#FEFAF0;}.or-help{background:var(--sky-p);}.or-no{background:#FAF0F0;}
.od{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.d-ok{background:#6DB88A;}.d-prog{background:#D4A84B;}.d-help{background:var(--sky);}.d-no{background:#C87878;}
.ot{font-size:13px;font-weight:500;color:var(--ink);line-height:1.4;}
.ol{font-size:10px;font-weight:600;margin-top:2px;}
.l-ok{color:#6DB88A;}.l-prog{color:#D4A84B;}.l-help{color:var(--sky);}.l-no{color:#C87878;}
.np{background:var(--lilac-p);border-left:3px solid var(--lilac);border-radius:0 11px 11px 0;padding:11px 13px;margin-top:11px;}
.nw{font-size:11px;font-weight:600;color:var(--lilac);margin-bottom:4px;}
.nt{font-size:12px;color:var(--ink);line-height:1.7;}
.audio-pill{margin-top:10px;background:linear-gradient(135deg,var(--lilac-p),var(--sky-p));border-radius:12px;padding:10px 12px;}
.audio-pill .al{font-size:10px;font-weight:700;color:var(--lilac);margin-bottom:6px;}

/* ASISTENCIA */
.ag{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.an{text-align:center;padding:14px 8px;border-radius:13px;border:1px solid;}
.an .n{font-size:26px;font-weight:800;line-height:1;margin-bottom:3px;}
.an .l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;}
.an-ok{background:#F0FAF4;border-color:#B0DCC0;color:#5A9A70;}
.an-no{background:#FAF0F0;border-color:#DDB8B8;color:#A06060;}
.an-pct{background:var(--sky-p);border-color:var(--sky-l);color:var(--sky);}
.racha{background:linear-gradient(135deg,#FEFAF0,#FFF8E8);border:1px solid #E8D898;border-radius:13px;padding:12px 15px;margin-bottom:12px;display:flex;align-items:center;gap:11px;}
.hr{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:11px;margin-bottom:5px;}
.hr-ok{background:#F0FAF4;}.hr-no{background:#FAF0F0;}.hr-cx{background:#FAF7F0;}
.hi{font-size:13px;font-weight:700;flex-shrink:0;min-width:14px;}
.hd{flex:1;font-size:13px;font-weight:500;color:var(--ink);}
.hb{font-size:10px;font-weight:700;}
.hb-ok{color:#6DB88A;}.hb-no{color:#C87878;}.hb-cx{color:#A09060;}

/* NOTAS */
.nc{border-radius:17px;padding:17px;margin-bottom:11px;border:1px solid;position:relative;overflow:hidden;}
.nc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.n-logro{background:#F2FAF5;border-color:#B8DCC8;}.n-logro::before{background:linear-gradient(90deg,#6DB88A,#9ABBA8);}
.n-tip{background:#FEFAF2;border-color:#E0D0A0;}.n-tip::before{background:linear-gradient(90deg,#D4A84B,#E8C870);}
.n-tarea{background:var(--rose-p);border-color:var(--rose-l);}.n-tarea::before{background:linear-gradient(90deg,var(--rose),var(--lilac));}
.n-info{background:var(--sky-p);border-color:var(--sky-l);}.n-info::before{background:linear-gradient(90deg,var(--sky),var(--lilac));}
.ntag{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;border-radius:20px;padding:3px 10px;margin-bottom:9px;border:1px solid;}
.n-logro .ntag{background:#E0F4E8;color:#5A9A70;border-color:#B8DCC8;}
.n-tip .ntag{background:#FEF4D8;color:#8A6A10;border-color:#E0D0A0;}
.n-tarea .ntag{background:var(--rose-l);color:#9A5060;border-color:var(--rose);}
.n-info .ntag{background:var(--sky-l);color:#3A7A90;border-color:var(--sky);}
.ntit{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:6px;line-height:1.35;}
.nbod{font-size:13px;color:var(--ink-60);line-height:1.7;}
.nfoot{display:flex;align-items:center;gap:7px;margin-top:11px;padding-top:9px;border-top:1px solid rgba(44,48,64,.07);}
.nav-a{width:22px;height:22px;background:var(--grad);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:white;overflow:hidden;}
.nav-a img{width:100%;height:100%;object-fit:contain;}
.nwho{font-size:11px;color:var(--ink-60);}

.empty-state{text-align:center;padding:40px 20px;color:var(--ink-30);}
.empty-state .ei{font-size:3rem;margin-bottom:12px;}
.spinner{width:32px;height:32px;border:3px solid var(--sky-l);border-top-color:var(--sky);border-radius:50%;animation:spin .8s linear infinite;margin:40px auto;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = supabase;
const sb = createClient('https://uoethqvuqbbxvckgpowd.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvZXRocXZ1cWJieHZja2dwb3dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MTM0MTgsImV4cCI6MjA5MjM4OTQxOH0.q9v8Gdy-OdPFjOgDV6MJz5a7jzNz1OpjQJeXNrMrNGc');
let pacienteData=null, sesionesData=[], fonoNombre='Fonoaudióloga', fonoTitulo='Fono Aprende';

const boxes = document.querySelectorAll('.code-box');
boxes.forEach((box,i) => {
  box.addEventListener('input', e => {
    box.value = box.value.toUpperCase().replace(/[^A-Z0-9]/g,'');
    box.classList.toggle('filled', box.value.length>0);
    if(box.value && i<5) boxes[i+1].focus();
    document.getElementById('btn-entrar').disabled = getCode().length < 6;
  });
  box.addEventListener('keydown', e => {
    if(e.key==='Backspace'&&!box.value&&i>0){boxes[i-1].focus();boxes[i-1].value='';boxes[i-1].classList.remove('filled');}
    if(e.key==='Enter') entrarConCodigo();
  });
  box.addEventListener('paste', e => {
    e.preventDefault();
    const txt=(e.clipboardData.getData('text')||'').toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,6);
    txt.split('').forEach((ch,j)=>{if(boxes[j]){boxes[j].value=ch;boxes[j].classList.add('filled');}});
    if(txt.length>0) boxes[Math.min(txt.length,5)].focus();
    document.getElementById('btn-entrar').disabled = getCode().length < 6;
  });
});

function getCode(){ return Array.from(boxes).map(b=>b.value).join(''); }

async function entrarConCodigo(){
  const codigo=getCode(); if(codigo.length<6) return;
  const btn=document.getElementById('btn-entrar');
  btn.disabled=true; btn.textContent='Buscando…';
  document.getElementById('login-err').textContent='';
  try{
    const {data,error}=await sb.from('pacientes').select('*').eq('codigo_familia',codigo).single();
    if(error||!data){
      document.getElementById('login-err').textContent='Código incorrecto. Verifica con tu fonoaudióloga.';
      btn.disabled=false; btn.textContent='Ingresar →';
      boxes.forEach(b=>{b.style.borderColor='#dc2626';});
      setTimeout(()=>boxes.forEach(b=>b.style.borderColor=''),1500);
      return;
    }
    pacienteData=data; await mostrarApp(data);
  }catch(e){
    document.getElementById('login-err').textContent='Error de conexión.';
    btn.disabled=false; btn.textContent='Ingresar →';
  }
}

async function mostrarApp(pac){
  try{
    const {data:cfg}=await sb.from('configuracion').select('nombre,titulo').eq('user_id',pac.user_id).single();
    if(cfg){fonoNombre=cfg.nombre||fonoNombre; fonoTitulo=cfg.titulo||fonoTitulo;}
  }catch(e){}
  const {data:ses}=await sb.from('sesiones').select('*').eq('paciente_id',pac.id).order('fecha',{ascending:false});
  sesionesData=ses||[];
  const initPac=(pac.nombre||'').split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()||'NN';
  const edad=pac.nacimiento?calcEdad(pac.nacimiento):'';
  document.getElementById('child-av').textContent=initPac;
  document.getElementById('child-name').textContent=pac.nombre;
  document.getElementById('child-age').textContent=edad;
  document.getElementById('ses-count').textContent=sesionesData.length;
  document.getElementById('prof-name').textContent=fonoNombre;
  document.getElementById('prof-spec').textContent=fonoTitulo;
  renderInicio(); renderAsistencia(); renderNotas();
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('screen-app').classList.add('active');
}

function renderInicio(){
  const cont=document.getElementById('inicio-content');
  if(!sesionesData.length){cont.innerHTML='<div class="empty-state"><div class="ei">📋</div><p>Aún no hay sesiones registradas</p></div>';return;}
  const estadoMap={
    'logrado':{cls:'or-ok',dot:'d-ok',lbl:'Logrado de forma independiente',lcls:'l-ok'},
    'apoyo':{cls:'or-help',dot:'d-help',lbl:'Logrado con apoyo',lcls:'l-help'},
    'parcial':{cls:'or-prog',dot:'d-prog',lbl:'En proceso · avanzando bien',lcls:'l-prog'},
    'no_logrado':{cls:'or-no',dot:'d-no',lbl:'Por trabajar',lcls:'l-no'},
  };
  function sesCard(s,label){
    const f=fmtFecha(s.fecha);
    const objs=parseObjs(s.objetivos_texto);
    const objsHtml=objs.map(o=>{
      const e=estadoMap[o.estado]||estadoMap['parcial'];
      return `<div class="or ${e.cls}"><div class="od ${e.dot}"></div><div><div class="ot">${o.texto}</div><div class="ol ${e.lcls}">${e.lbl}</div></div></div>`;
    }).join('');
    const nota=s.tareas||s.observaciones?`<div class="np"><div class="nw">Nota de ${fonoNombre}</div><div class="nt">${s.tareas||s.observaciones}</div></div>`:'';
    const audio=s.audio_url?`<div class="audio-pill"><div class="al">🎙️ Nota de voz</div><audio controls src="${s.audio_url}" style="width:100%;height:36px;"></audio></div>`:'';
    return `<div class="card"><div class="ses-tag">${label} · ${f}</div>${objsHtml}${nota}${audio}</div>`;
  }
  let html='';
  sesionesData.forEach((s,i)=>{
    if(i===0){html+='<div class="sec-lbl">📋 Última sesión</div>'; html+=sesCard(s,'Sesión');}
    else{if(i===1) html+='<div class="sec-lbl" style="margin-top:16px;">📋 Sesiones anteriores</div>'; html+=sesCard(s,'Sesión '+(sesionesData.length-i));}
  });
  cont.innerHTML=html;
}

function renderAsistencia(){
  const cont=document.getElementById('asist-content');
  const total=sesionesData.length;
  if(!total){cont.innerHTML='<div class="empty-state"><div class="ei">📅</div><p>Sin sesiones aún</p></div>';return;}
  const asiste=sesionesData.filter(s=>s.asistencia==='asiste'||!s.asistencia).length;
  const noAsiste=sesionesData.filter(s=>s.asistencia==='no_asiste').length;
  const pct=total?Math.round((asiste/total)*100):0;
  let racha=0; for(const s of sesionesData){if(s.asistencia==='asiste'||!s.asistencia) racha++; else break;}
  const histHtml=sesionesData.map(s=>{
    const f=fmtFechaLarga(s.fecha),a=s.asistencia||'asiste';
    if(a==='asiste') return `<div class="hr hr-ok"><span class="hi">✓</span><span class="hd">${f}</span><span class="hb hb-ok">Asistió</span></div>`;
    if(a==='no_asiste') return `<div class="hr hr-no"><span class="hi">✗</span><span class="hd">${f}</span><span class="hb hb-no">Ausencia</span></div>`;
    return `<div class="hr hr-cx"><span class="hi">—</span><span class="hd">${f}</span><span class="hb hb-cx">Cancelada</span></div>`;
  }).join('');
  cont.innerHTML=`

      <div class="an an-ok"><div class="n">${asiste}</div><div class="l">Asistidas</div></div>

}

function renderNotas(){
  const cont=document.getElementById('notas-content');
  const conObs=sesionesData.filter(s=>s.observaciones||s.logros||s.barreras||s.tareas);
  if(!conObs.length){cont.innerHTML='<div class="empty-state"><div class="ei">💡</div><p>Sin notas aún</p></div>';return;}
  const fono=fonoNombre.split(' ')[0];
  const html=conObs.map(s=>{
    const f=fmtFecha(s.fecha); let cards='';
    if(s.logros) cards+=notaCard('n-logro','Logro',s.logros,f,fono);
    if(s.observaciones) cards+=notaCard('n-info','Nota clínica',s.observaciones,f,fono);
    if(s.barreras) cards+=notaCard('n-tip','Consejo',s.barreras,f,fono);
    if(s.tareas) cards+=notaCard('n-tarea','Tarea para casa',s.tareas,f,fono);
    return cards;
  }).join('');
  cont.innerHTML=html;
}

function parseObjs(txt){
  if(!txt) return [];
  return txt.split(',').map(x=>x.trim()).filter(Boolean).map(item=>{
    const m=item.match(/^(.+?)\s*\[(.+?)\]$/);
    return {texto:m?m[1].trim():item,estado:m?m[2].trim().replace(' ','_'):null};
  });
}

function calcEdad(f){
  const hoy=new Date(),nac=new Date(f);
  let a=hoy.getFullYear()-nac.getFullYear();
  const m=hoy.getMonth()-nac.getMonth();
  if(m<0||(m===0&&hoy.getDate()<nac.getDate())) a--;
  return a+' años';
}
function fmtFecha(f){return new Date(f+'T12:00:00').toLocaleDateString('es-CL',{day:'numeric',month:'long',year:'numeric'});}
function fmtFechaLarga(f){return new Date(f+'T12:00:00').toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'});}

function tab(btn,id){
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tp').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active'); document.getElementById(id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function salir(){
  pacienteData=null; sesionesData=[];
  boxes.forEach(b=>{b.value='';b.classList.remove('filled');});
  document.getElementById('btn-entrar').disabled=true;
  document.getElementById('login-err').textContent='';
  document.getElementById('screen-app').classList.remove('active');
  document.getElementById('screen-login').classList.add('active');
  setTimeout(()=>{if(boxes[0]) boxes[0].focus();},300);
}

window.addEventListener('load', async()=>{
  const params=new URLSearchParams(window.location.search);
  const tokenRaw=params.get('t');
  if(tokenRaw){
    try{
      const td=JSON.parse(atob(decodeURIComponent(tokenRaw)));
      if(td.uid){
        try{
          const {data:cfg}=await sb.from('configuracion').select('nombre,titulo').eq('user_id',td.uid).single();
          if(cfg){
            document.getElementById('login-fono-nombre').textContent=cfg.nombre||'Fonoaudióloga';
            document.getElementById('login-fono-spec').textContent=cfg.titulo||'Fono Aprende';
          }
        }catch(e){}
      }
      if(td.pid){
        const {data}=await sb.from('pacientes').select('*').eq('id',td.pid).single();
        if(data){pacienteData=data;await mostrarApp(data);return;}
      }
    }catch(e){}
  }
  setTimeout(()=>{if(boxes[0]) boxes[0].focus();},300);
});
</script>
