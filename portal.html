<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Portal Familias · Fono Aprende</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --sky:#89C4D9; --sky-l:#C8E4F0; --sky-p:#EDF6FA;
  --lilac:#B8A0CC; --lilac-l:#DDD0EE; --lilac-p:#F4F0FA;
  --rose:#D9A0B0; --rose-l:#EDD0D8; --rose-p:#FAF0F3;
  --sage:#9ABBA8; --sage-l:#C8DDD2; --sage-p:#EDF5F1;
  --sand:#C8B890;
  --ink:#2C3040; --ink-60:#7A7E90; --ink-30:#C0C2CC;
  --grad:linear-gradient(135deg,#C8E4F0,#DDD0EE);
  --bg:linear-gradient(160deg,#EDF6FA 0%,#F4F0FA 50%,#FAF0F3 100%);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;color:var(--ink);}
.screen{display:none;}.screen.active{display:block;}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.login-card{background:white;border-radius:28px;padding:36px 24px 28px;width:100%;max-width:380px;box-shadow:0 8px 48px rgba(44,48,64,.12);}

.login-logo{text-align:center;margin-bottom:28px;}
.login-brain{font-size:48px;display:block;margin-bottom:8px;}
.login-app{font-size:20px;font-weight:800;color:var(--sky);letter-spacing:-.3px;}
.login-sub{font-size:12px;color:var(--ink-30);margin-top:3px;}

/* Código 6 dígitos */
.code-label{font-size:13px;font-weight:600;color:var(--ink-60);text-align:center;margin-bottom:14px;}
.code-boxes{display:flex;gap:8px;justify-content:center;margin-bottom:20px;}
.code-box{
  width:46px;height:56px;border:2px solid rgba(44,48,64,.15);
  border-radius:14px;font-size:22px;font-weight:800;
  text-align:center;color:var(--ink);background:#FAFCFF;
  outline:none;text-transform:uppercase;
  transition:border-color .2s, box-shadow .2s;
  font-family:'DM Sans',sans-serif;
  caret-color:var(--sky);
}
.code-box:focus{border-color:var(--sky);box-shadow:0 0 0 4px rgba(137,196,217,.2);}
.code-box.filled{border-color:var(--sky);background:var(--sky-p);}

.btn-enter{
  width:100%;padding:16px;background:var(--grad);
  color:white;border:none;border-radius:16px;
  font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;
  cursor:pointer;box-shadow:0 4px 18px rgba(137,196,217,.4);
  transition:all .2s;letter-spacing:.3px;
}
.btn-enter:active{transform:scale(.98);opacity:.9;}
.btn-enter:disabled{opacity:.5;cursor:not-allowed;}

.login-err{
  text-align:center;font-size:13px;color:#dc2626;
  margin-top:12px;min-height:18px;font-weight:500;
}
.login-help{
  text-align:center;font-size:12px;color:var(--ink-30);
  margin-top:20px;padding-top:16px;
  border-top:1px solid rgba(44,48,64,.07);
  line-height:1.6;
}
.login-help strong{color:var(--sky);}

/* ── HEADER ── */
.app-hdr{
  background:rgba(255,255,255,.95);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(44,48,64,.07);
  padding:0 16px;position:sticky;top:0;z-index:100;
}
.prof-bar{display:flex;align-items:center;gap:10px;padding:12px 0 10px;border-bottom:1px solid rgba(44,48,64,.06);}
.prof-av{width:34px;height:34px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:white;flex-shrink:0;}
.prof-name{font-size:13px;font-weight:600;color:var(--ink);}
.prof-spec{font-size:11px;color:var(--ink-60);}
.btn-salir{margin-left:auto;background:none;border:1.5px solid var(--ink-30);border-radius:10px;padding:6px 13px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--ink-60);cursor:pointer;}

.child-bar{display:flex;align-items:center;gap:12px;padding:10px 0 12px;}
.child-av{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--sage),var(--sky));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:white;flex-shrink:0;}
.child-name{font-size:15px;font-weight:700;color:var(--ink);}
.child-age{font-size:11px;color:var(--ink-60);margin-top:2px;}
.child-cnt{margin-left:auto;background:var(--sky-p);border:1px solid var(--sky-l);border-radius:10px;padding:6px 12px;text-align:center;}
.child-cnt .n{font-size:18px;font-weight:800;color:var(--sky);line-height:1;}
.child-cnt .l{font-size:9px;font-weight:600;color:var(--ink-60);text-transform:uppercase;}

/* código visible en header */
.codigo-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--lilac-p);border:1px solid var(--lilac-l);
  border-radius:20px;padding:3px 10px;
  font-size:11px;font-weight:700;color:var(--lilac);
  cursor:pointer;margin-left:8px;
}

/* ── NAV ── */
.nav{display:flex;background:rgba(255,255,255,.95);border-bottom:1px solid rgba(44,48,64,.07);}
.nb{flex:1;padding:11px 4px;background:none;border:none;border-bottom:2.5px solid transparent;margin-bottom:-1px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;}
.nb .ni{font-size:20px;display:block;margin-bottom:3px;}
.nb .nl{font-size:10px;font-weight:600;color:var(--ink-60);letter-spacing:.3px;}
.nb.active{border-bottom-color:var(--sky);}
.nb.active .nl{color:var(--sky);}

/* ── CONTENT ── */
.tc{padding:16px;max-width:480px;margin:0 auto;padding-bottom:48px;}
.tp{display:none;}.tp.active{display:block;}

/* ── CARDS ── */
.card{background:white;border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:0 2px 14px rgba(44,48,64,.07);}
.sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ink-60);margin-bottom:10px;}

/* ── SESIÓN ── */
.ses-tag{display:inline-block;font-size:10px;font-weight:700;color:var(--sky);text-transform:uppercase;letter-spacing:.6px;background:var(--sky-p);border:1px solid var(--sky-l);border-radius:20px;padding:3px 11px;margin-bottom:12px;}
.or{display:flex;align-items:flex-start;gap:9px;padding:8px 11px;border-radius:11px;margin-bottom:5px;}
.or-ok{background:#F0FAF4;}.or-prog{background:#FEFAF0;}.or-help{background:var(--sky-p);}.or-no{background:#FAF0F0;}
.od{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.d-ok{background:#6DB88A;}.d-prog{background:#D4A84B;}.d-help{background:var(--sky);}.d-no{background:#C87878;}
.ot{font-size:13px;font-weight:500;color:var(--ink);line-height:1.4;}
.ol{font-size:10px;font-weight:600;margin-top:2px;}
.l-ok{color:#6DB88A;}.l-prog{color:#D4A84B;}.l-help{color:var(--sky);}.l-no{color:#C87878;}
.np{background:var(--lilac-p);border-left:3px solid var(--lilac);border-radius:0 11px 11px 0;padding:11px 13px;margin-top:11px;}
.nw{font-size:11px;font-weight:600;color:var(--lilac);margin-bottom:4px;}
.nt{font-size:12px;color:var(--ink);line-height:1.7;}

/* ── ASISTENCIA ── */
.ag{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.an{text-align:center;padding:14px 8px;border-radius:13px;border:1px solid;}
.an .n{font-size:26px;font-weight:800;line-height:1;margin-bottom:3px;}
.an .l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;}
.an-ok{background:#F0FAF4;border-color:#B0DCC0;color:#5A9A70;}
.an-no{background:#FAF0F0;border-color:#DDB8B8;color:#A06060;}
.an-pct{background:var(--sky-p);border-color:var(--sky-l);color:var(--sky);}
.racha{background:linear-gradient(135deg,#FEFAF0,#FFF8E8);border:1px solid #E8D898;border-radius:13px;padding:12px 15px;margin-bottom:12px;display:flex;align-items:center;gap:11px;}
.cal-m{font-size:11px;font-weight:700;color:var(--ink-60);text-align:center;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.ch{font-size:9px;font-weight:700;color:var(--ink-30);text-align:center;padding:3px 0;text-transform:uppercase;}
.cd{aspect-ratio:1;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;}
.c-e{background:transparent;}.c-n{background:rgba(44,48,64,.04);color:var(--ink-60);}
.c-ok{background:var(--sage);color:white;font-weight:700;}
.c-no{background:var(--rose);color:white;font-weight:700;}
.c-cx{background:var(--sand);color:white;font-weight:700;}
.cl{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:10px;}
.li{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--ink-60);}
.ld{width:9px;height:9px;border-radius:3px;}
.hr{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:11px;margin-bottom:5px;}
.hr-ok{background:#F0FAF4;}.hr-no{background:#FAF0F0;}.hr-cx{background:#FAF7F0;}
.hi{font-size:13px;font-weight:700;flex-shrink:0;min-width:14px;}
.hd{flex:1;font-size:13px;font-weight:500;color:var(--ink);}
.hb{font-size:10px;font-weight:700;}
.hb-ok{color:#6DB88A;}.hb-no{color:#C87878;}.hb-cx{color:#A09060;}

/* ── EMPTY ── */
.empty-state{text-align:center;padding:40px 20px;color:var(--ink-30);}
.empty-state .ei{font-size:3rem;margin-bottom:12px;}
.empty-state p{font-size:.85rem;}

/* ── LOADING ── */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;}
.spinner{width:36px;height:36px;border:3px solid var(--sky-l);border-top-color:var(--sky);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-size:14px;color:var(--ink-60);}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="screen-login" class="screen active">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <span class="login-brain">🧠</span>
        <div class="login-app">Portal Familias</div>
        <div class="login-sub">Fono Aprende · Sesión en un Click</div>
      </div>

      <div class="code-label">Ingresa tu código de 6 dígitos</div>
      <div class="code-boxes" id="code-boxes">
        <input class="code-box" maxlength="1" inputmode="text" autocomplete="off" id="c0">
        <input class="code-box" maxlength="1" inputmode="text" autocomplete="off" id="c1">
        <input class="code-box" maxlength="1" inputmode="text" autocomplete="off" id="c2">
        <input class="code-box" maxlength="1" inputmode="text" autocomplete="off" id="c3">
        <input class="code-box" maxlength="1" inputmode="text" autocomplete="off" id="c4">
        <input class="code-box" maxlength="1" inputmode="text" autocomplete="off" id="c5">
      </div>

      <button class="btn-enter" id="btn-entrar" onclick="entrarConCodigo()" disabled>Entrar →</button>
      <div class="login-err" id="login-err"></div>

      <div class="login-help">
        Tu fonoaudióloga te entregó un código de<br>
        <strong>6 letras y números</strong> para acceder.<br>
        Ejemplo: <strong>A3K9BZ</strong>
      </div>
    </div>
  </div>
</div>

<!-- ══ LOADING ══ -->
<div id="screen-loading" class="screen">
  <div class="loading-wrap">
    <div class="spinner"></div>
    <div class="loading-txt">Cargando portal…</div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="screen-app" class="screen">

  <div class="app-hdr">
    <div class="prof-bar">
      <div class="prof-av" id="prof-av">FA</div>
      <div>
        <div class="prof-name" id="prof-name">Fonoaudióloga</div>
        <div class="prof-spec" id="prof-spec">Fono Aprende</div>
      </div>
      <button class="btn-salir" onclick="salir()">Salir</button>
    </div>
    <div class="child-bar">
      <div class="child-av" id="child-av">NN</div>
      <div>
        <div class="child-name" id="child-name">Cargando…</div>
        <div class="child-age" id="child-age"></div>
      </div>
      <div class="child-cnt">
        <div class="n" id="ses-count">0</div>
        <div class="l">sesiones</div>
      </div>
    </div>
  </div>

  <div class="nav">
    <button class="nb active" onclick="tab(this,'tp-inicio')"><span class="ni">🏠</span><span class="nl">Inicio</span></button>
    <button class="nb" onclick="tab(this,'tp-asistencia')"><span class="ni">📅</span><span class="nl">Asistencia</span></button>
    <button class="nb" onclick="tab(this,'tp-notas')"><span class="ni">💡</span><span class="nl">Notas</span></button>
  </div>

  <div class="tc">

    <!-- INICIO -->
    <div id="tp-inicio" class="tp active">
      <div id="inicio-content">
        <div class="loading-wrap" style="min-height:40vh;">
          <div class="spinner"></div>
        </div>
      </div>
    </div>

    <!-- ASISTENCIA -->
    <div id="tp-asistencia" class="tp">
      <div id="asist-content">
        <div class="loading-wrap" style="min-height:40vh;">
          <div class="spinner"></div>
        </div>
      </div>
    </div>

    <!-- NOTAS -->
    <div id="tp-notas" class="tp">
      <div id="notas-content">
        <div class="loading-wrap" style="min-height:40vh;">
          <div class="spinner"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = supabase;
const sb = createClient(
  'https://uoethqvuqbbxvckgpowd.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvZXRocXZ1cWJieHZja2dwb3dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MTM0MTgsImV4cCI6MjA5MjM4OTQxOH0.q9v8Gdy-OdPFjOgDV6MJz5a7jzNz1OpjQJeXNrMrNGc'
);

let pacienteData = null;
let sesionesData = [];

// ── CÓDIGO BOXES ──
const boxes = document.querySelectorAll('.code-box');
boxes.forEach((box, i) => {
  box.addEventListener('input', e => {
    box.value = box.value.toUpperCase().replace(/[^A-Z0-9]/g,'');
    box.classList.toggle('filled', box.value.length > 0);
    if (box.value && i < 5) boxes[i+1].focus();
    checkCodeComplete();
  });
  box.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !box.value && i > 0) {
      boxes[i-1].focus();
      boxes[i-1].value = '';
      boxes[i-1].classList.remove('filled');
    }
    if (e.key === 'Enter') entrarConCodigo();
  });
  box.addEventListener('paste', e => {
    e.preventDefault();
    const txt = (e.clipboardData.getData('text')||'').toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,6);
    txt.split('').forEach((ch,j) => {
      if (boxes[j]) { boxes[j].value=ch; boxes[j].classList.add('filled'); }
    });
    if (txt.length > 0) boxes[Math.min(txt.length,5)].focus();
    checkCodeComplete();
  });
});

function checkCodeComplete() {
  const code = getCode();
  document.getElementById('btn-entrar').disabled = code.length < 6;
}

function getCode() {
  return Array.from(boxes).map(b=>b.value).join('');
}

function setErr(msg) {
  document.getElementById('login-err').textContent = msg;
}

// ── LOGIN POR CÓDIGO ──
async function entrarConCodigo() {
  const codigo = getCode();
  if (codigo.length < 6) return;

  const btn = document.getElementById('btn-entrar');
  btn.disabled = true; btn.textContent = 'Buscando…';
  setErr('');

  try {
    const { data, error } = await sb
      .from('pacientes')
      .select('*')
      .eq('codigo_familia', codigo)
      .single();

    if (error || !data) {
      setErr('Código incorrecto. Verifica con tu fonoaudióloga.');
      btn.disabled = false; btn.textContent = 'Entrar →';
      boxes.forEach(b=>{ b.style.borderColor='#dc2626'; });
      setTimeout(()=>boxes.forEach(b=>b.style.borderColor=''), 1500);
      return;
    }

    pacienteData = data;
    mostrarApp(data);

  } catch(e) {
    setErr('Error de conexión. Intenta de nuevo.');
    btn.disabled = false; btn.textContent = 'Entrar →';
  }
}

// ── MOSTRAR APP ──
async function mostrarApp(pac) {
  show('screen-loading');

  // Cargar sesiones
  const { data: ses } = await sb
    .from('sesiones')
    .select('*')
    .eq('paciente_id', pac.id)
    .order('fecha', { ascending: false });
  sesionesData = ses || [];

  // Cargar config de la fonoaudióloga
  let fonoNombre = 'Tu fonoaudióloga';
  let fonoTitulo = 'Fonoaudióloga';
  try {
    const { data: cfg } = await sb
      .from('configuracion')
      .select('nombre,titulo')
      .eq('user_id', pac.user_id)
      .single();
    if (cfg) { fonoNombre = cfg.nombre || fonoNombre; fonoTitulo = cfg.titulo || fonoTitulo; }
  } catch(e) {}

  // Render header
  const initPac = initials(pac.nombre);
  const initFono = initials(fonoNombre);
  const edad = pac.nacimiento ? calcEdad(pac.nacimiento) : '';

  document.getElementById('child-av').textContent = initPac;
  document.getElementById('child-name').textContent = pac.nombre;
  document.getElementById('child-age').textContent = edad;
  document.getElementById('ses-count').textContent = sesionesData.length;
  document.getElementById('prof-av').textContent = initFono;
  document.getElementById('prof-name').textContent = fonoNombre;
  document.getElementById('prof-spec').textContent = fonoTitulo;

  renderInicio();
  renderAsistencia();
  renderNotas();

  show('screen-app');
}

// ── RENDER INICIO ──
function renderInicio() {
  const cont = document.getElementById('inicio-content');
  if (!sesionesData.length) {
    cont.innerHTML = '<div class="empty-state"><div class="ei">📋</div><p>Aún no hay sesiones registradas</p></div>';
    return;
  }

  const estadoMap = {
    'logrado':    { cls:'or-ok',   dot:'d-ok',   lbl:'Logrado de forma independiente', lcls:'l-ok' },
    'apoyo':      { cls:'or-help', dot:'d-help',  lbl:'Logrado con apoyo',              lcls:'l-help' },
    'parcial':    { cls:'or-prog', dot:'d-prog',  lbl:'En proceso · avanzando bien',    lcls:'l-prog' },
    'no_logrado': { cls:'or-no',   dot:'d-no',    lbl:'Por trabajar',                   lcls:'l-no' },
  };

  function renderSesCard(s, label) {
    const f = fmtFecha(s.fecha);
    const objs = parseObjetivos(s.objetivos_texto);
    const objsHtml = objs.map(o => {
      const e = estadoMap[o.estado] || estadoMap['parcial'];
      return `<div class="or ${e.cls}">
        <div class="od ${e.dot}"></div>
        <div><div class="ot">${o.texto}</div><div class="ol ${e.lcls}">${e.lbl}</div></div>
      </div>`;
    }).join('');
    const notaHtml = s.tareas ? `<div class="np"><div class="nw">🏠 Tarea para casa</div><div class="nt">${s.tareas}</div></div>` : '';
    const audioHtml = s.audio_url ? `<audio controls src="${s.audio_url}" style="width:100%;height:36px;margin-top:8px;"></audio>` : '';
    return `<div class="card"><div class="ses-tag">${label} · ${f}</div>${objsHtml}${notaHtml}${audioHtml}</div>`;
  }

  let html = '';
  sesionesData.forEach((s,i) => {
    if (i===0) { html += '<div class="sec-lbl" style="margin-bottom:8px;">Última sesión</div>'; html += renderSesCard(s,'Sesión'); }
    else { if(i===1) html += '<div class="sec-lbl" style="margin:16px 0 8px;">Sesiones anteriores</div>'; html += renderSesCard(s,'Sesión '+(sesionesData.length-i)); }
  });
  cont.innerHTML = html;
}

// ── RENDER ASISTENCIA ──
function renderAsistencia() {
  const cont = document.getElementById('asist-content');
  const total = sesionesData.length;
  if (!total) { cont.innerHTML='<div class="empty-state"><div class="ei">📅</div><p>Sin sesiones aún</p></div>'; return; }

  const asiste = sesionesData.filter(s=>s.asistencia==='asiste'||!s.asistencia).length;
  const noAsiste = sesionesData.filter(s=>s.asistencia==='no_asiste').length;
  const cancel = sesionesData.filter(s=>s.asistencia==='cancelada').length;
  const pct = total ? Math.round((asiste/total)*100) : 0;

  // Racha
  let racha=0;
  for(const s of sesionesData) {
    if(s.asistencia==='asiste'||!s.asistencia) racha++;
    else break;
  }

  const histHtml = sesionesData.map(s => {
    const f = fmtFechaLarga(s.fecha);
    const a = s.asistencia||'asiste';
    if(a==='asiste') return `<div class="hr hr-ok"><span class="hi">✓</span><span class="hd">${f}</span><span class="hb hb-ok">Asistió</span></div>`;
    if(a==='no_asiste') return `<div class="hr hr-no"><span class="hi">✗</span><span class="hd">${f}</span><span class="hb hb-no">Ausencia</span></div>`;
    return `<div class="hr hr-cx"><span class="hi">—</span><span class="hd">${f}</span><span class="hb hb-cx">Cancelada</span></div>`;
  }).join('');

  cont.innerHTML = `
    ${racha>=2?`<div class="racha"><span style="font-size:24px">🔥</span><div><div style="font-size:13px;font-weight:700;color:#8A6A10">${racha} sesiones seguidas asistidas</div><div style="font-size:11px;color:#A08030;margin-top:2px">La constancia hace la diferencia</div></div></div>`:''}
    <div class="ag">
      <div class="an an-ok"><div class="n">${asiste}</div><div class="l">Asistidas</div></div>
      <div class="an an-no"><div class="n">${noAsiste}</div><div class="l">Ausencias</div></div>
      <div class="an an-pct"><div class="n">${pct}%</div><div class="l">Asistencia</div></div>
    </div>
    <div class="card"><div class="sec-lbl">Historial</div>${histHtml}</div>
  `;
}

// ── RENDER NOTAS ──
function renderNotas() {
  const cont = document.getElementById('notas-content');
  const conObs = sesionesData.filter(s=>s.observaciones||s.logros||s.barreras);
  if (!conObs.length) { cont.innerHTML='<div class="empty-state"><div class="ei">💡</div><p>Sin notas aún</p></div>'; return; }

  const html = conObs.map(s => {
    const f = fmtFecha(s.fecha);
    let cards = '';
    if(s.logros) cards += notaCard('n-logro','Logro',s.logros,f);
    if(s.observaciones) cards += notaCard('n-info','Nota clínica',s.observaciones,f);
    if(s.barreras) cards += notaCard('n-tip','Consejo',s.barreras,f);
    return cards;
  }).join('');
  cont.innerHTML = html;
}

function notaCard(cls, tag, texto, fecha) {
  const tagColors = {
    'n-logro':'#5A9A70','n-info':'#3A7A90','n-tip':'#8A6A10','n-tarea':'#9A5060'
  };
  return `<div class="card" style="border-left:3px solid;border-color:${tagColors[cls]||'var(--sky)'};">
    <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:${tagColors[cls]};margin-bottom:6px;">${tag}</div>
    <div style="font-size:14px;color:var(--ink);line-height:1.7;">${texto}</div>
    <div style="font-size:11px;color:var(--ink-30);margin-top:8px;">${fecha}</div>
  </div>`;
}

// ── UTILS ──
function parseObjetivos(txt) {
  if (!txt) return [];
  return txt.split(',').map(x=>x.trim()).filter(Boolean).map(item => {
    const match = item.match(/^(.+?)\s*\[(.+?)\]$/);
    return { texto: match?match[1].trim():item, estado: match?match[2].trim().replace(' ','_'):null };
  });
}

function initials(nombre) {
  return (nombre||'').split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()||'??';
}

function calcEdad(fechaNac) {
  const hoy=new Date(), nac=new Date(fechaNac);
  let a=hoy.getFullYear()-nac.getFullYear();
  const m=hoy.getMonth()-nac.getMonth();
  if(m<0||(m===0&&hoy.getDate()<nac.getDate())) a--;
  return a+' años';
}

function fmtFecha(f) {
  return new Date(f+'T12:00:00').toLocaleDateString('es-CL',{day:'numeric',month:'long',year:'numeric'});
}

function fmtFechaLarga(f) {
  return new Date(f+'T12:00:00').toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'});
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function tab(btn, id) {
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tp').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function salir() {
  pacienteData=null; sesionesData=[];
  boxes.forEach(b=>{b.value='';b.classList.remove('filled');});
  document.getElementById('btn-entrar').disabled=true;
  document.getElementById('login-err').textContent='';
  show('screen-login');
  boxes[0].focus();
}

// ── AUTO-LOGIN por token legacy (compatibilidad hacia atrás) ──
window.addEventListener('load', async () => {
  const params = new URLSearchParams(window.location.search);
  const tokenRaw = params.get('t');
  if (tokenRaw) {
    try {
      const tokenData = JSON.parse(atob(decodeURIComponent(tokenRaw)));
      if (tokenData.pid) {
        show('screen-loading');
        const { data } = await sb.from('pacientes').select('*').eq('id', tokenData.pid).single();
        if (data) { pacienteData=data; await mostrarApp(data); return; }
      }
    } catch(e) {}
  }
  show('screen-login');
  setTimeout(()=>boxes[0].focus(), 300);
});
</script>
